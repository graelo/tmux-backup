# Any commit on main & PRs

name: Essentials
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Quality checks & tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable]
    steps:
      - name: Rust install
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          # fetch-depth: ${{ github.event.pull_request.commits }}

      - name: Cache crates from crates.io
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        continue-on-error: false
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: '${{ runner.os }}-cargo-${{ matrix.rust }}-hash-${{ hashFiles(''**/Cargo.lock'') }}'

      - name: Quality - cargo fmt
        run: |
          cargo fmt --all -- --check

      - name: Quality - cargo clippy
        run: |
          cargo clippy -- -D warnings

      - name: Quality - convco check
        run: |
          git show-ref
          echo Commit message: "$(git log -1 --pretty=%B)"
          curl -sSfLO https://github.com/convco/convco/releases/latest/download/convco-ubuntu.zip
          unzip convco-ubuntu.zip
          chmod +x convco
          ./convco --version
          ./convco check -c .convco
          rm convco

      - name: Quality - cargo deny check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh api repos/EmbarkStudios/cargo-deny/releases/latest --jq '.tag_name')
          curl -sSfL "https://github.com/EmbarkStudios/cargo-deny/releases/download/${VERSION}/cargo-deny-${VERSION}-x86_64-unknown-linux-musl.tar.gz" | \
            tar zx --no-anchored cargo-deny --strip-components=1
          chmod +x cargo-deny
          mv cargo-deny ~/.cargo/bin/
          cargo deny check

      # - name: Quality - cargo udeps (needs nightly)
      #   run: |
      #     cargo install --locked cargo-udeps || true
      #     cargo udeps

      - name: Quality - cargo pants
        run: |
          cargo install --locked cargo-pants || true
          cargo pants

      - name: Build (dev)
        run: cargo build --all-features

      - name: Build (release)
        run: cargo build --all-features --release

      - name: Test
        run: ./ci/test_full.sh

  zizmor:
    name: GHA Supply Chain Security
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
