# Tag-triggered release: build multi-platform binaries and publish.
#
# Local:
#   act push -W .github/workflows/release.yml -j prepare-artifacts
#   act push -W .github/workflows/release.yml -j release
#   act push -W .github/workflows/release.yml -j homebrew

name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  prepare-artifacts:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.xz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            archive: tar.xz
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.xz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.xz
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build (release)
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --locked --release --target "${TARGET}"

      - name: Stage binary and archive
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE_FORMAT: ${{ matrix.archive }}
          TAG: ${{ github.ref_name }}
          BIN: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          SRC="target/${TARGET}/release/${BIN}"

          STANDALONE="${BIN}-${TARGET}"
          cp "${SRC}" "${STANDALONE}"

          PKG_DIR="${BIN}-${TAG}-${TARGET}"
          mkdir "${PKG_DIR}"
          cp "${SRC}" "${PKG_DIR}/"
          cp README.md LICENSE* "${PKG_DIR}/" 2>/dev/null || true

          if [[ "${ARCHIVE_FORMAT}" == "zip" ]]; then
            ARCHIVE_FILE="${PKG_DIR}.zip"
            7z a "${ARCHIVE_FILE}" "${PKG_DIR}" >/dev/null
          else
            ARCHIVE_FILE="${PKG_DIR}.tar.xz"
            tar -cJf "${ARCHIVE_FILE}" "${PKG_DIR}"
          fi

          echo "STANDALONE=${STANDALONE}" >> "${GITHUB_ENV}"
          echo "ARCHIVE_FILE=${ARCHIVE_FILE}" >> "${GITHUB_ENV}"

      - name: Attest provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ${{ env.STANDALONE }}
            ${{ env.ARCHIVE_FILE }}

      - name: Upload – standalone
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.STANDALONE }}
          path: ${{ env.STANDALONE }}
          retention-days: 1

      - name: Upload – archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARCHIVE_FILE }}
          path: ${{ env.ARCHIVE_FILE }}
          retention-days: 1

  release:
    name: Publish release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    needs:
      - prepare-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # convco needs all history to create the changelog
          fetch-depth: 0
          persist-credentials: false

      - name: Install convco
        run: |
          curl -sSfLO https://github.com/convco/convco/releases/latest/download/convco-ubuntu.zip
          unzip convco-ubuntu.zip
          chmod +x convco

      - name: Generate changelog
        run: |
          ./convco changelog -c .convco --max-versions 1 > CHANGELOG.md
          rm convco convco-ubuntu.zip

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --notes-file CHANGELOG.md \
            ./artifacts/*

  homebrew:
    name: Bump Homebrew formula
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    needs:
      - release
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: graelo
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write

      - name: Extract version
        id: extract-version
        run: |
          echo "tag-name=${GITHUB_REF#refs/tags/}" >> "${GITHUB_OUTPUT}"

      - name: Bump Homebrew formula
        uses: mislav/bump-homebrew-formula-action@ccf2332299a883f6af50a1d2d41e5df7904dd769 # v4.1
        if: '!contains(github.ref, ''-'')' # skip prereleases
        with:
          formula-name: tmux-backup
          homebrew-tap: graelo/homebrew-tap
          push-to: graelo/homebrew-tap
          create-pullrequest: true
          download-url: https://github.com/graelo/tmux-backup/archive/refs/tags/${{ steps.extract-version.outputs.tag-name }}.tar.gz
          commit-message: |
            {{formulaName}} {{version}}

            Created by https://github.com/mislav/bump-homebrew-formula-action
        env:
          COMMITTER_TOKEN: ${{ steps.app-token.outputs.token }}
