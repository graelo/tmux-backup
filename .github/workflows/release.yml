# Tag-triggered release: build multi-platform binaries and publish.
#
# Local:
#   act push -W .github/workflows/release.yml -j prepare-artifacts
#   act push -W .github/workflows/release.yml -j release

name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  prepare-artifacts:
    name: Build artifacts
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            rust: stable
            suffix: ''
            archive_ext: zip
          - os: macos-15-intel
            target: x86_64-apple-darwin
            rust: stable
            suffix: ''
            archive_ext: zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            rust: stable
            suffix: ''
            archive_ext: tar.xz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            rust: stable
            suffix: ''
            archive_ext: tar.xz
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Install musl-tools (Linux)
        if: contains(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Build (release)
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "${TARGET}"

      - name: Package – compress (zip)
        if: matrix.archive_ext == 'zip'
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          TARGET: ${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          cp "target/${TARGET}/release/${REPO_NAME}" .
          zip -A "${REPO_NAME}-${TARGET}.${ARCHIVE_EXT}" "${REPO_NAME}"

      - name: Package – compress (tar.xz)
        if: matrix.archive_ext == 'tar.xz'
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          TARGET: ${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          cp "target/${TARGET}/release/${REPO_NAME}" .
          tar Jcf "${REPO_NAME}-${TARGET}.${ARCHIVE_EXT}" "${REPO_NAME}"

      - name: Upload – archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          path: ${{ github.event.repository.name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          retention-days: 1

  release:
    name: Publish release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    needs:
      - prepare-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # convco needs all history to create the changelog
          fetch-depth: 0
          persist-credentials: false

      - name: Extract version
        id: extract-version
        run: |
          echo "tag-name=${GITHUB_REF#refs/tags/}" >> "${GITHUB_OUTPUT}"

      - name: Install convco
        run: |
          git show-ref
          curl -sSfLO https://github.com/convco/convco/releases/latest/download/convco-ubuntu.zip
          unzip convco-ubuntu.zip
          chmod +x convco

      - name: Generate changelog
        run: |
          ./convco changelog -c .convco --max-versions 1 --include-hidden-sections > CHANGELOG.md
          rm convco convco-ubuntu.zip

      - name: Download – archive (x86_64-unknown-linux-musl)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ github.event.repository.name }}-x86_64-unknown-linux-musl.tar.xz
      - name: Download – archive (aarch64-unknown-linux-musl)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ github.event.repository.name }}-aarch64-unknown-linux-musl.tar.xz
      - name: Download – archive (aarch64-apple-darwin)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ github.event.repository.name }}-aarch64-apple-darwin.zip
      - name: Download – archive (x86_64-apple-darwin)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ github.event.repository.name }}-x86_64-apple-darwin.zip

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --notes-file CHANGELOG.md \
            ./*.zip ./*.tar.xz

      - name: Attest provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: '*.zip,*.tar.xz'

  homebrew:
    name: Bump Homebrew formula
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    needs:
      - release
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: graelo
          repositories: homebrew-tap

      - name: Extract version
        id: extract-version
        run: |
          echo "tag-name=${GITHUB_REF#refs/tags/}" >> "${GITHUB_OUTPUT}"

      - name: Bump formula in graelo/homebrew-tap
        uses: mislav/bump-homebrew-formula-action@ccf2332299a883f6af50a1d2d41e5df7904dd769 # v4.1
        if: '!contains(github.ref, ''-'')' # skip prereleases
        with:
          formula-name: tmux-backup
          homebrew-tap: graelo/homebrew-tap
          push-to: graelo/homebrew-tap
          create-pullrequest: true
          download-url: https://github.com/graelo/tmux-backup/archive/refs/tags/${{ steps.extract-version.outputs.tag-name }}.tar.gz
          commit-message: |
            {{formulaName}} {{version}}

            Created by https://github.com/mislav/bump-homebrew-formula-action
        env:
          COMMITTER_TOKEN: ${{ steps.app-token.outputs.token }}
